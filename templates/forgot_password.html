<!doctype html>
<html lang="en">
<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Cooking INA</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400;1,9..144,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_additions.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth_modals.css') }}"/>
</head>
<body id="bodyRoot">

<header>
  <div class="header-inner">
    <a href="{{ url_for('index') }}" class="logo">Cooking <span>INA</span></a>
    <div style="flex:1"></div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card">

    <!-- ── STEP 1: Enter email ─────────────────────────────────── -->
    <div id="fpStep1">
      <div class="auth-logo">Cooking <span>INA</span></div>
      <h2 class="auth-title">Forgot Password?</h2>
      <p class="auth-sub">Enter your email and we'll send you a reset code.</p>

      <div id="fp1Error" class="auth-banner auth-banner-error" style="display:none"></div>

      <div class="auth-form">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="fpEmail" placeholder="you@email.com"
                 autocomplete="email" oninput="clearBanner('fp1Error')"
                 onkeydown="if(event.key==='Enter') fpSendCode()"/>
        </div>
        <button class="btn-primary" id="fpSendBtn" onclick="fpSendCode()">
          <span id="fpSendText">Send Reset Code</span>
          <span id="fpSendSpinner" class="btn-spinner" style="display:none">⏳</span>
        </button>
      </div>

      <p class="auth-switch"><a href="{{ url_for('login') }}">← Back to login</a></p>
    </div>

    <!-- ── STEP 2: Enter OTP ───────────────────────────────────── -->
    <div id="fpStep2" style="display:none">
      <div class="otp-icon">🔑</div>
      <h3 class="otp-title">Enter Reset Code</h3>
      <p class="otp-sub">Code sent to <strong id="fpEmailDisplay"></strong></p>

      <div id="fp2Error"   class="auth-banner auth-banner-error"   style="display:none"></div>
      <div id="fp2Success" class="auth-banner auth-banner-success" style="display:none"></div>

      <div class="otp-inputs" id="fpOtpInputs">
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
               oninput="otpInput(this,0,'fp')" onkeydown="otpBack(event,this,0,'fp')" autocomplete="off"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
               oninput="otpInput(this,1,'fp')" onkeydown="otpBack(event,this,1,'fp')" autocomplete="off"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
               oninput="otpInput(this,2,'fp')" onkeydown="otpBack(event,this,2,'fp')" autocomplete="off"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
               oninput="otpInput(this,3,'fp')" onkeydown="otpBack(event,this,3,'fp')" autocomplete="off"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
               oninput="otpInput(this,4,'fp')" onkeydown="otpBack(event,this,4,'fp')" autocomplete="off"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
               oninput="otpInput(this,5,'fp')" onkeydown="otpBack(event,this,5,'fp')" autocomplete="off"/>
      </div>

      <button class="btn-primary otp-submit-btn" id="fpVerifyBtn" onclick="fpVerifyCode()">
        <span id="fpVerifyText">Verify Code</span>
        <span id="fpVerifySpinner" class="btn-spinner" style="display:none">⏳</span>
      </button>

      <div class="otp-resend-row">
        <span class="otp-resend-label">Didn't receive it?</span>
        <button class="otp-resend-btn" id="fpResendBtn" onclick="fpResendCode()">Resend Code</button>
        <span class="otp-countdown" id="fpCountdown" style="display:none"></span>
      </div>

      <button class="otp-back-btn" onclick="fpGoStep(1)">← Change email</button>
    </div>

    <!-- ── STEP 3: New password ────────────────────────────────── -->
    <div id="fpStep3" style="display:none">
      <div class="otp-icon">🔒</div>
      <h3 class="otp-title">Set New Password</h3>
      <p class="otp-sub">Choose a strong new password for your account.</p>

      <div id="fp3Error"   class="auth-banner auth-banner-error"   style="display:none"></div>
      <div id="fp3Success" class="auth-banner auth-banner-success" style="display:none"></div>

      <div class="auth-form">
        <div class="form-group">
          <label>New Password</label>
          <div class="pw-wrap">
            <input type="password" id="fpNewPw" placeholder="Min. 8 characters"
                   autocomplete="new-password" oninput="checkPwStrength(this.value)"/>
            <button type="button" class="pw-toggle" onclick="togglePw('fpNewPw',this)" tabindex="-1">👁</button>
          </div>
          <div class="pw-strength" id="pwStrength" style="display:none">
            <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
            <span id="pwLabel"></span>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <div class="pw-wrap">
            <input type="password" id="fpConfirmPw" placeholder="Repeat password"
                   autocomplete="new-password"/>
            <button type="button" class="pw-toggle" onclick="togglePw('fpConfirmPw',this)" tabindex="-1">👁</button>
          </div>
        </div>
        <button class="btn-primary" id="fpResetBtn" onclick="fpResetPassword()">
          <span id="fpResetText">Update Password</span>
          <span id="fpResetSpinner" class="btn-spinner" style="display:none">⏳</span>
        </button>
      </div>
    </div>

  </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
