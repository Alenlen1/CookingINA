<!doctype html>
<html lang="en">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Cooking INA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400;1,9..144,700&family=Outfit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style_additions.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth_modals.css') }}"
    />
  </head>
  <body id="bodyRoot">
    <header>
      <div class="header-inner">
        <a href="{{ url_for('index') }}" class="logo"
          >Cooking <span>INA</span></a
        >
        <div style="flex: 1"></div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
          🌙
        </button>
      </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %} {% for
    category, msg in messages %}
    <div class="flash flash-{{ category }}">{{ msg }}</div>
    {% endfor %} {% endwith %}

    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">Cooking <span>INA</span></div>
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-sub">Log in to your account</p>

        <form method="POST" class="auth-form">
          <div class="form-group">
            <label>Email or Username</label>
            <input
              type="text"
              name="identifier"
              required
              placeholder="you@email.com"
              autocomplete="username"
            />
          </div>
          <div class="form-group">
            <label>
              Password
              <a
                href="{{ url_for('auth.forgot_password') }}"
                style="
                  float: right;
                  font-size: 0.8rem;
                  color: var(--accent);
                  font-weight: 500;
                  text-decoration: none;
                "
                tabindex="-1"
                >Forgot password?</a
              >
            </label>
            <div class="pw-wrap">
              <input
                type="password"
                name="password"
                id="loginPw"
                required
                placeholder="••••••••"
                autocomplete="current-password"
              />
              <button
                type="button"
                class="pw-toggle"
                onclick="togglePw('loginPw', this)"
                tabindex="-1"
              >
                👁
              </button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Log In</button>
        </form>

        <p class="auth-switch">
          Don't have an account?
          <a href="{{ url_for('register') }}">Register</a>
        </p>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    {% include 'nav_voice_widget.html' %}
  </body>
</html>
